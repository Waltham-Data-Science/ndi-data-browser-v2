<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Audit 2026-04-23 (#68): app is light-mode only (see index.css
         `color-scheme: light`). Declaring `light dark` here contradicted
         that and led to 168 dead `dark:*` Tailwind utilities across 24
         files that never activated. Keep these two values aligned. -->
    <meta name="color-scheme" content="light" />
    <meta name="description" content="NDI Data Browser — explore neuroscience datasets in NDI Cloud" />
    <!--
      Geist + Geist Mono are self-hosted via `@fontsource-variable/*`
      (imported in `src/main.tsx`). No Google Fonts CDN — avoids the
      third-party DNS + TLS on first paint, keeps the site usable behind
      corporate firewalls that block fonts.gstatic.com, and eliminates
      the GDPR concern of hitting Google on every first visit.
    -->
    <title>NDI Data Browser</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
