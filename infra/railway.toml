[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/Dockerfile"

[deploy]
healthcheckPath = "/api/health/ready"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Right-sized for current usage (<10 concurrent users): one replica serves
# all real traffic with headroom. Running two replicas would double the
# Railway compute bill for zero capacity benefit AND introduce a subtle
# correctness bug — the rate-limit counters in backend/middleware/rate_limit.py
# fall back to per-replica in-process state when Redis is unavailable, so 2x
# replicas = 2x the configured rate-limit ceiling.
#
# Bump back to 2 (or higher) when:
#   - concurrent sessions climb above ~100, or
#   - true zero-downtime deploys become user-visible (current ~30s health-check
#     cutover is tolerable for <10 users but not for larger loads).
numReplicas = 1
# --proxy-headers + --forwarded-allow-ips '*' (B8): Railway fronts the
# container with an edge proxy and rewrites the source IP to its own. Without
# these flags `request.client.host` resolves to the Railway edge IP for every
# request, silently collapsing the per-IP rate-limit envelope onto a single
# subject (one bad actor DoS-es every user's login; distributed attacks
# vanish from logs). The wildcard is intentional: Railway does not publish
# stable edge-proxy IPs, and the underlying container is not directly
# internet-reachable. If that ever changes, tighten the allowlist.
# Tests at backend/tests/unit/test_proxy_headers_config.py pin this contract.
startCommand = "sh -c 'exec uvicorn backend.app:app --host 0.0.0.0 --port ${PORT:-8000} --workers ${WEB_CONCURRENCY:-4} --timeout-graceful-shutdown 30 --proxy-headers --forwarded-allow-ips \"*\"'"

# Environment is configured in the Railway dashboard, but these are the keys we require.
# Set as secrets before deploy:
#   NDI_CLOUD_URL
#   REDIS_URL                 (auto-provided by Railway Redis add-on as ${{Redis.REDIS_URL}})
#   SESSION_ENCRYPTION_KEY
#   CSRF_SIGNING_KEY
#   CORS_ORIGINS              e.g. https://ndb-v2.up.railway.app
#   ENVIRONMENT=production
#   SENTRY_DSN                (optional)
#   WEB_CONCURRENCY=4
