name: CI
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  hygiene:
    # Audit 2026-04-23 (#51). Rejects macOS Finder / iCloud-Drive
    # "Filename 2.ext" duplicate files — they previously shipped in the
    # working tree and distorted local coverage runs. Fast — runs in
    # ~2s and short-circuits later jobs via `needs:` implicit ordering.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject Finder-duplicate files
        run: |
          DUPES=$(find . -regextype posix-extended \
            -regex '.*[[:space:]][0-9]+\.(py|ts|tsx|json|yml|yaml|md|scss|css)$' \
            -not -path './.git/*' \
            -not -path '*/node_modules/*' \
            -not -path '*/.venv/*' \
            -not -path '*/dist/*' \
            -not -path '*/.pytest_cache/*' \
            -not -path '*/.mypy_cache/*' \
            -not -path '*/.ruff_cache/*' || true)
          if [ -n "$DUPES" ]; then
            echo "::error::Finder-duplicate files detected. Delete them locally:"
            echo "$DUPES"
            exit 1
          fi

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt ruff mypy pydantic types-cachetools
      - run: ruff check backend/
      # mypy runs in strict mode, gated by CI. Config lives in
      # backend/pyproject.toml; tests/ are laxer via an exclude regex.
      - run: mypy --config-file backend/pyproject.toml backend/

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - run: pip install pytest pytest-asyncio pytest-cov respx hypothesis fakeredis freezegun
      # Explicit --cov-fail-under gate so coverage cannot silently drift below 70%
      # (config-loading bugs, pytest-cov version changes, etc. cannot bypass this).
      - run: python -m pytest backend/tests/unit backend/tests/integration --cov=backend --cov-report=xml --cov-report=term-missing --cov-fail-under=70
        env:
          NDI_CLOUD_URL: https://api.example.test/v1
          REDIS_URL: redis://localhost:6379/0
          SESSION_ENCRYPTION_KEY: Btm_VUmLOztsh3lqD0jZGNzEkuRzi6UMri-63iOT_4A=
          CSRF_SIGNING_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: backend/coverage.xml

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run lint --if-present
      # Audit 2026-04-23 (#73): run tests with coverage + thresholds so a
      # PR deleting tests fails CI. Thresholds configured in vitest.config.ts.
      - run: npx vitest run --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage
      - run: npm run build
      # Bundle-size gate (plan §M7-8). Fails if JS+CSS gzip > 200 KB.
      # Run from the repo root so relative `frontend/dist` resolves.
      - run: node ../scripts/check-bundle-size.mjs --dist=dist
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-checks]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -f infra/Dockerfile -t ndb-v2:ci .

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install pip-audit
      - run: pip-audit -r backend/requirements.txt --strict || true
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: cd frontend && npm audit --audit-level=high || true
