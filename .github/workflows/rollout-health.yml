name: Rollout health probe
on:
  # Manual-only by default. During a staged cutover, add
  #   schedule: [{cron: "*/10 * * * *"}]
  # and remove it after the cutover finishes. Keeping this off-by-default
  # prevents burning minutes indefinitely after rollout completes.
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The script is dependency-free on purpose — python stdlib only.
      - name: Probe rollout health
        id: probe
        run: |
          python scripts/rollout-health-probe.py \
            --target https://ndb-v2-production.up.railway.app \
            --baseline .rollout-baseline.json
      # If the script fails, open an issue with the output so a human
      # can review + decide whether to drop ROLLOUT_PCT via Railway.
      # We deliberately do NOT auto-rollback — see the long comment in
      # scripts/rollout-health-probe.py.
      - name: Open issue on regression
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Rollout health regression at ${new Date().toISOString()}`;
            const body = [
              'The scheduled `rollout-health-probe` job failed — p95 latency or',
              '5xx rate has breached the plan §M7-10 thresholds.',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Next steps:',
              '1. Read the job log for the specific gate that tripped.',
              '2. If real, drop `ROLLOUT_PCT` on Railway (manual).',
              '3. Re-run this workflow once traffic stabilizes.',
            ].join('\\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['rollout', 'incident'],
            });
